<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory System UI</title>
  </head>
  <body>
    <h1>Memory System</h1>

    <textarea id="raw" placeholder="Paste anything..." rows="4" cols="60"></textarea><br />
    <button id="saveBtn">Save</button>
    <button id="refreshBtn">Refresh</button>
    <button id="healthBtn">Health</button>
    <p id="status"></p>

    <h2>Update Item</h2>
    <input id="updateId" placeholder="item_id" size="35" />
    <input id="updateRaw" placeholder="new raw content" size="40" />
    <button id="updateBtn">Update</button>

    <h2>Feed</h2>
    <pre id="feed"></pre>

    <h2>Health</h2>
    <pre id="health"></pre>

    <script>
      const API_BASE = 'https://memory-wugweb.vercel.app/api';

      async function api(path, options = {}) {
        const res = await fetch(`${API_BASE}${path}`, options);
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'request failed');
        return data;
      }

      async function loadFeed() {
        const data = await api('/items');
        document.getElementById('feed').textContent = JSON.stringify(data, null, 2);
      }

      async function saveItem() {
        const raw = document.getElementById('raw').value.trim();
        if (!raw) return;

        const data = await api('/items', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ raw })
        });

        document.getElementById('status').textContent = data.status === 'exists' ? 'Already exists' : 'Saved';
        await loadFeed();
      }

      async function updateItem() {
        const item_id = document.getElementById('updateId').value.trim();
        const raw = document.getElementById('updateRaw').value.trim();
        if (!item_id || !raw) return;

        await api('/sync', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ item_id, raw })
        });

        document.getElementById('status').textContent = 'Updated';
        await loadFeed();
      }

      async function loadHealth() {
        const data = await api('/health');
        document.getElementById('health').textContent = JSON.stringify(data, null, 2);
      }

      document.getElementById('saveBtn').addEventListener('click', () => {
        saveItem().catch((err) => (document.getElementById('status').textContent = err.message));
      });

      document.getElementById('refreshBtn').addEventListener('click', () => {
        loadFeed().catch((err) => (document.getElementById('status').textContent = err.message));
      });

      document.getElementById('updateBtn').addEventListener('click', () => {
        updateItem().catch((err) => (document.getElementById('status').textContent = err.message));
      });

      document.getElementById('healthBtn').addEventListener('click', () => {
        loadHealth().catch((err) => (document.getElementById('status').textContent = err.message));
      });

      loadFeed().catch(() => {});
    </script>
  </body>
</html>
